<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="DNYF DevStudio - Professional web-based IDE with multi-language support, live preview, API testing, and offline capabilities" />
  <meta name="keywords" content="IDE, code editor, developer tools, web IDE, Monaco editor, PWA, offline coding" />
  <meta name="author" content="DNYFTECH" />
  
  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DevStudio" />
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="DNYF DevStudio - Professional Web IDE" />
  <meta property="og:description" content="Full-featured web-based IDE with multi-language support, live preview, and offline capabilities" />
  <meta property="og:image" content="/logo-512.png" />
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DNYF DevStudio" />
  <meta name="twitter:description" content="Professional web-based IDE by DNYFTECH" />
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  
  <title>DNYF DevStudio - Professional Web IDE</title>
  
  <style>
    /* Loading Screen */
    #app-loader {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Courier New', monospace;
      color: #00ffff;
    }
    
    .loader-logo {
      font-size: 3rem;
      font-weight: bold;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 2rem;
    }
    
    .loader-bar {
      width: 300px;
      height: 4px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }
    
    .loader-progress {
      height: 100%;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
      background-size: 200% 100%;
      animation: loading 1.5s linear infinite;
      box-shadow: 0 0 20px #00ffff;
    }
    
    .loader-text {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #00ffff;
      opacity: 0.7;
      animation: blink 1s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    
    @keyframes loading {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-logo">DNYF DevStudio</div>
    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>
    <div class="loader-text">Initializing development environment...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
